# tests/fixtures/credentials.toml — sample credentials structure for tests.
#
# This file is committed to the repo and contains NO real secrets.
# It mirrors the shape of a real consumer's credentials.toml so the
# FileCredentialStore tests can validate parsing + lookup-by-env-var.
#
# A real consumer's credentials live in their own gitignored file —
# typically config/secrets/knowledge.credentials.toml — pointed at via
# the FileCredentialStore({ credentialsPath: ... }) constructor.

[exa]
key       = "REPLACE_WITH_REAL_KEY"
env_var   = "EXA_API_KEY"
docs      = "https://docs.exa.ai"
free_tier = true

[gemini]
key       = "REPLACE_WITH_REAL_KEY"
env_var   = "GEMINI_API_KEY"
docs      = "https://ai.google.dev/gemini-api/docs"
free_tier = true

[openrouter]
key       = "REPLACE_WITH_REAL_KEY"
env_var   = "OPENROUTER_API_KEY"
docs      = "https://openrouter.ai/docs"
free_tier = true
